<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Удаление записи</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h1>Удалить запись?</h1>
    <p>Вы уверены, что хотите удалить запись от {{ record.created_at }} на сумму {{ record.amount }}?</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Удалить</button>
      <a href="{% url 'records_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
</body>
</html>
