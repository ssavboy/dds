<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% if record %}Редактирование{% else %}Новая запись{% endif %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h1>{% if record %}Редактирование записи{% else %}Новая запись{% endif %}</h1>
    <form method="post" class="mb-3">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Сохранить</button>
      <a href="{% url 'records_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
</body>
</html>
